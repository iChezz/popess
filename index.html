<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Multiplayer - Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Rock Paper Scissors Multiplayer</h1>
        
        <div class="menu">
            <h2>Buat atau Gabung Game</h2>
            
            <div class="form-group">
                <input type="text" id="playerName" placeholder="Nama kamu" maxlength="20">
            </div>
            
            <div class="button-group">
                <button id="createGame" class="btn btn-primary">🎲 Buat Game Baru</button>
                <button id="joinGame" class="btn btn-secondary">🔗 Gabung dengan ID</button>
            </div>
            
            <div id="joinSection" style="display: none;">
                <input type="text" id="gameIdInput" placeholder="Masukkan Game ID">
                <button id="confirmJoin" class="btn btn-success">Gabung</button>
            </div>
        </div>
        
        <div class="info">
            <p>💡 Cara bermain: 
                <br>1. Buat game baru atau gabung dengan ID
                <br>2. Tunggu pemain lain bergabung
                <br>3. Pilih Batu, Kertas, atau Gunting
                <br>4. Tunggu hasilnya!
            </p>
        </div>
    </div>
    
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
